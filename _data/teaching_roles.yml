- title: Senior Academy Tutor (Maths & Physics)
  issuer: Widening Participation Unit, QUB
  date: 2024/2026
  description: Provided up to 10 hours of personalised subject tutoring to Year 13 and 14 students from underrepresented backgrounds as part of Queen's University Belfast's Senior Academy Programme. The programme supports students in developing academic skills and confidence to progress into Higher Education, Further Education, or Higher Level Apprenticeships.

- title: PHY2006 Mathematical Physics
  issuer: School of Maths & Physics, QUB
  date: 2025/2026
  description: A third-year module covering advanced linear algebra, Fourier analysis, partial differential equations, and numerical methods for solving ODEs and PDEs.

- title: PHY1002 Mathematics for Scientists and Engineers
  issuer: School of Maths & Physics, QUB
  date: 2024/2025
  description: A first-year module covering core mathematical tools for physics, including calculus, linear algebra, complex numbers, vector calculus, and ordinary differential equations.

- title: PHY3009 Computational Physics
  issuer: School of Maths & Physics, QUB
  date: 2023/2024
  description: A third-year module covering numerical methods for PDEs, Bayesian statistics, and parameter estimation, with a focus on algorithm development and scientific computing.